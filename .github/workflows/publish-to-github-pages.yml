name: publish-to-github-pages
on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    if: github.repository == 'FirebirdSQL/jaybird-manual'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
      - name: Build with Gradle
        run: ./gradlew makePages
      - name: Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: pages-artifact
          path: build/pages
          compression-level: 9
          retention-days: 1
  publish-pages:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Get pages artifact
        uses: actions/download-artifact@v8
        with:
          name: pages-artifact
          path: pages
      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          branch: gh-pages
          folder: pages